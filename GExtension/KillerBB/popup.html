<!DOCTYPE html>
<html>
<head>
  <link href="https://uti.blackboard.com/favicon.ico" rel="icon" type="image/x-icon">
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #fff; width: 280px; padding: 15px; margin: 0; }
    h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 10px; }
    .control-group { margin-bottom: 15px; }
    select, input { width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; outline: none; box-sizing: border-box; }
    .de-inputs { display: none; gap: 5px; margin-top: 10px; }
    .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
    button { flex: 1; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #btn-start { background-color: #2ea043; color: white; }
    #btn-start:hover:not(:disabled) { background-color: #238636; }
    #btn-pause { background-color: #d29922; color: white; }
    #btn-kill { background-color: #f85149; color: white; }
    
    /* Status Indicator */
    .status-container { display: flex; align-items: center; justify-content: space-between; background: #2d2d2d; padding: 10px; border-radius: 4px; font-size: 12px; margin-bottom: 10px;}
    .indicator { height: 10px; width: 10px; border-radius: 50%; background-color: #8b949e; margin-right: 8px; display: inline-block; }
    .indicator.running { background-color: #3fb950; box-shadow: 0 0 8px #3fb950; animation: pulse 1.5s infinite; }
    .indicator.paused { background-color: #d29922; }
    
    #de-live-timer { display: none; text-align: center; font-family: monospace; font-size: 18px; color: #00ff00; background: #000; padding: 8px; border-radius: 4px; margin-bottom: 10px;}

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(63, 185, 80, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(63, 185, 80, 0); }
    }
  </style>
</head>
<body>
  <h3>BlackBoard Killer</h3>
  
  <div class="control-group">
    <select id="script-selector">
      <option value="iol_engine.js">IOL Auto-Complete Engine</option>
      <option value="de_engine.js">DE Auto-Complete Engine</option>
    </select>
    
    <div class="de-inputs" id="de-config-panel">
      <input type="number" id="de-min" placeholder="Min" value="15" min="0" max="180">
      <input type="number" id="de-sec" placeholder="Sec" value="0" min="0" max="59">
      <input type="number" id="de-score" placeholder="Score (0-100)" value="100" min="0" max="100">
    </div>
  </div>

  <div id="de-live-timer">00:00</div>

  <div class="btn-row">
    <button id="btn-start">Inject & Run</button>
  </div>
  <div class="btn-row">
    <button id="btn-pause" disabled>Pause</button>
    <button id="btn-kill" disabled>Kill</button>
  </div>

  <div class="status-container">
    <div><span class="indicator" id="status-dot"></span><span id="status-text">Idle / Not Injected</span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
